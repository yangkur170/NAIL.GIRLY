<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail.Girly | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Firebase (real-time database for products & orders) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        :root {
            --milk: #F5F6F8;            /* cool white */
            --y2k-pink: #8A9099;        /* main silver accent */
            --soft-pink: #D7DBE0;       /* light silver (shadows) */
            --accent-blue: #B4B9C1;     /* secondary silver */
            --ink: #1F2329;             /* near-black text */
            --chrome: linear-gradient(135deg, #EDEEF0 0%, #B9BEC6 20%, #F4F5F7 42%, #A2A8B0 60%, #DCDEE2 80%, #9CA1A9 100%);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--milk);
            color: #333;
            scroll-behavior: smooth;
        }

        h1, h2, h3 {
            font-family: 'Syne', sans-serif;
        }

        .glass-nav {
            background: rgba(255, 253, 245, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--y2k-pink);
        }

        .marquee {
            overflow: hidden;
            white-space: nowrap;
            background: var(--chrome);
            padding: 10px 0;
            border-top: 2px solid #000;
            border-bottom: 2px solid #000;
        }
        .animate-marquee { color: var(--ink) !important; }
        
        .animate-marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .y2k-btn {
            background: var(--chrome);
            color: var(--ink) !important;
            box-shadow: 4px 4px 0px #000;
            border: 2px solid #000;
            transition: 0.2s;
        }

        .y2k-btn:active {
            box-shadow: 0px 0px 0px #000;
            transform: translate(4px, 4px);
        }

        .product-card {
            background: white;
            border: 2px solid #eee;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .product-card:hover {
            border-color: var(--y2k-pink);
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 10px 10px 0px var(--soft-pink);
        }

        .category-pill:hover, .category-pill.active {
            background-color: var(--y2k-pink);
            color: white;
            border-color: black;
        }

        .order-card {
            background: white;
            border: 3px solid #000;
            border-radius: 24px;
        }

        .hidden { display: none; }

        /* ===== Silver Chrome theme overrides (maps old pink/blue to silver) ===== */
        .text-pink-500 { color: #6E747C !important; }
        .text-pink-400 { color: #9CA1A9 !important; }
        .text-blue-400 { color: #9CA1A9 !important; }
        .hover\:text-pink-500:hover { color: #3A3F47 !important; }
        .bg-pink-500 { background-color: #6E747C !important; }
        .bg-pink-100 { background-color: #ECEEF1 !important; }
        .bg-pink-50  { background-color: #F2F3F5 !important; }
        .border-pink-400 { border-color: #B4B9C1 !important; }
        .hover\:bg-pink-50:hover { background-color: #F2F3F5 !important; }
        /* Chrome shimmer for the logo + hero title */
        nav .text-pink-500, nav .text-blue-400 {
            background: var(--chrome);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(1px 1px 0 rgba(0,0,0,.25));
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 w-full max-w-sm text-center rounded-[30px] border-4 border-black shadow-[8px_8px_0px_#000]">
            <h1 class="text-3xl font-black italic mb-6 uppercase text-pink-500">Staff Login</h1>
            <input type="password" id="admin-pass" placeholder="Enter Password" class="w-full border-4 border-black p-4 rounded-2xl mb-4 font-bold outline-none">
            <button onclick="requestNotifyAndLogin()" class="y2k-btn w-full py-4 text-white font-black uppercase rounded-2xl">Enter Dashboard</button>
            <p class="mt-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Enable notifications to receive orders</p>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard" class="hidden">
        <!-- Announcement Bar -->
        <div class="marquee font-bold uppercase text-sm tracking-tighter italic">
            <span class="inline-block animate-marquee italic text-white">
                ADMIN MODE: MANAGING INVENTORY 💅 EDITING LIVE FRONTEND 🎀 ADMIN MODE: MANAGING INVENTORY 💅 EDITING LIVE FRONTEND 🎀
            </span>
        </div>

        <!-- Navigation -->
        <nav class="glass-nav sticky top-0 z-50 px-6 py-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="text-3xl font-black italic tracking-tighter text-pink-500">
                    NAIL<span class="text-blue-400">.ADMIN</span>
                </div>
                <div class="flex gap-2 sm:gap-4">
                    <button id="view-toggle" onclick="toggleView()" class="px-4 sm:px-6 py-2 bg-black text-white font-bold rounded-xl text-xs uppercase">View Orders</button>
                    <button onclick="logout()" class="px-6 py-2 bg-red-100 text-red-600 border-2 border-red-600 font-bold rounded-xl text-xs uppercase">Logout</button>
                </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <header class="py-12 px-6 text-center bg-[#EEF0F3] border-b border-black/5">
            <h1 id="hero-title" class="text-4xl sm:text-5xl md:text-7xl font-black italic mb-4 uppercase leading-tight">
                Inventory <span class="text-transparent" style="-webkit-text-stroke: 1.5px #9CA1A9;">Control</span>
            </h1>
            <p id="inventory-subtext" class="font-bold text-gray-400 uppercase text-xs tracking-widest">Add or Edit your 2026 Collection below</p>
        </header>

        <div id="inventory-view">
            <!-- Categories Filters -->
            <div class="max-w-7xl mx-auto px-6 py-6 flex gap-4 overflow-x-auto no-scrollbar" id="category-filters">
                <button class="category-pill whitespace-nowrap border-2 border-black px-6 py-2 rounded-full font-bold uppercase text-xs active" onclick="filterAdmin('All Styles')">All Styles</button>
                <button class="category-pill whitespace-nowrap border-2 border-gray-200 px-6 py-2 rounded-full font-bold uppercase text-xs text-gray-500" onclick="filterAdmin('Cyber Chrome')">Cyber Chrome</button>
                <button class="category-pill whitespace-nowrap border-2 border-gray-200 px-6 py-2 rounded-full font-bold uppercase text-xs text-gray-500" onclick="filterAdmin('Milk Creamy')">Milk Creamy</button>
                <button class="category-pill whitespace-nowrap border-2 border-gray-200 px-6 py-2 rounded-full font-bold uppercase text-xs text-gray-500" onclick="filterAdmin('Pink Butterfly')">Pink Butterfly</button>
            </div>

            <!-- Admin Actions -->
            <main class="max-w-7xl mx-auto px-6 py-6">
                <button onclick="openAdminModal()" class="w-full py-6 border-4 border-dashed border-pink-400 rounded-3xl text-pink-500 font-black italic text-xl hover:bg-pink-50 transition mb-10">
                    + ADD NEW PRODUCT
                </button>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8" id="admin-product-grid"></div>
            </main>
        </div>

        <!-- Orders Content -->
        <div id="orders-view" class="hidden max-w-7xl mx-auto px-6 py-10">
            <div id="orders-grid" class="space-y-6">
                <!-- Orders will appear here -->
            </div>
        </div>
    </div>

    <!-- Form Modal (Integrated Like Frontend) -->
    <div id="form-modal" class="fixed inset-0 z-[600] hidden flex items-center justify-center p-4 backdrop-blur-sm bg-black/20">
        <div class="bg-white w-full max-w-md rounded-[40px] p-6 sm:p-8 border-4 border-black shadow-[10px_10px_0px_#B9BEC6] relative max-h-[90vh] overflow-y-auto">
            <h2 id="form-title" class="text-3xl font-black italic uppercase mb-8 text-pink-500 text-center">Add Product</h2>
            <input type="hidden" id="edit-index" value="">
            <div class="space-y-4">
                <input type="text" id="p-name" placeholder="Product Name" class="w-full border-2 border-black p-4 rounded-2xl font-bold outline-none">
                <input type="number" id="p-price" placeholder="Price ($)" class="w-full border-2 border-black p-4 rounded-2xl font-bold outline-none">
                <select id="p-category" class="w-full border-2 border-black p-4 rounded-2xl font-bold bg-white outline-none">
                    <option value="Cyber Chrome">Cyber Chrome</option>
                    <option value="Milk Creamy">Milk Creamy</option>
                    <option value="Pink Butterfly">Pink Butterfly</option>
                </select>
                <textarea id="p-desc" placeholder="Description" class="w-full border-2 border-black p-4 rounded-2xl font-bold h-24 outline-none"></textarea>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase text-gray-400 px-2">Upload Photo</label>
                    <input type="file" id="p-file" accept="image/*" onchange="handleFileSelect(event)" class="w-full border-2 border-black p-3 rounded-2xl text-sm font-bold bg-white">
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeAdminModal()" class="px-6 py-4 border-2 border-black font-bold uppercase rounded-2xl">Cancel</button>
                <button onclick="saveProduct()" class="y2k-btn flex-grow py-4 text-white font-black uppercase rounded-2xl tracking-widest">Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- Live data from Firestore ---
        let products = [];
        let orders = [];
        let selectedImageData = "";
        let currentFilter = "All Styles";
        let isOrderView = false;
        let listenersStarted = false;
        let seedAttempted = false;

        // The 4 starter products, only used to seed an empty database once.
        const baseProducts = [
            { name: 'Milk Marble Pink', price: 22.00, desc: 'Modern Y2K Aesthetic', img: 'https://placehold.co/400x400/FFD1E3/FF8AD8?text=Soft+Nails', category: 'Milk Creamy' },
            { name: 'Cyber Blue Star', price: 18.50, desc: 'Holographic Finish', img: 'https://placehold.co/400x400/A0E9FF/333?text=Blue+Chrome', category: 'Cyber Chrome' },
            { name: 'Creamy Pearl', price: 25.00, desc: 'Elegant & Clean', img: 'https://placehold.co/400x400/FFF9FB/FF8AD8?text=Creamy+White', category: 'Milk Creamy' },
            { name: 'Pink Heart 3D', price: 20.00, desc: 'Kawaii Y2K Style', img: 'https://placehold.co/400x400/E3D1FF/333?text=Heart+Nails', category: 'Pink Butterfly' }
        ];

        function requestNotifyAndLogin() {
            if ("Notification" in window) {
                Notification.requestPermission();
            }
            checkAuth();
        }

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === 'Roth369') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                startListeners();
            } else {
                alert("Wrong password! 💅");
            }
        }

        function startListeners() {
            if (listenersStarted) return;
            listenersStarted = true;

            // Live products
            db.collection('products').orderBy('createdAt', 'asc').onSnapshot(async (snap) => {
                products = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
                if (snap.empty && !seedAttempted) {
                    seedAttempted = true;
                    await seedBaseProducts();
                    return; // snapshot will fire again with the new products
                }
                renderAdminProducts();
            }, (err) => console.error('Products load failed:', err));

            // Live orders + desktop notification for new ones
            let firstOrderSnapshot = true;
            db.collection('orders').orderBy('createdAt', 'desc').onSnapshot((snap) => {
                orders = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
                if (!firstOrderSnapshot) {
                    snap.docChanges().forEach((change) => {
                        if (change.type === 'added' && Notification.permission === 'granted') {
                            new Notification("New Order Received! 🎀", {
                                body: "A new customer has just placed an order. Check the dashboard!",
                                icon: "https://placehold.co/100x100/FF8AD8/white?text=Order"
                            });
                        }
                    });
                }
                firstOrderSnapshot = false;
                renderOrders();
            }, (err) => console.error('Orders load failed:', err));
        }

        async function seedBaseProducts() {
            for (const p of baseProducts) {
                await db.collection('products').add({
                    ...p,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        function toggleView() {
            isOrderView = !isOrderView;
            const btn = document.getElementById('view-toggle');
            const inv = document.getElementById('inventory-view');
            const ord = document.getElementById('orders-view');
            const title = document.getElementById('hero-title');
            const sub = document.getElementById('inventory-subtext');

            if (isOrderView) {
                btn.innerText = "View Inventory";
                inv.classList.add('hidden');
                ord.classList.remove('hidden');
                title.innerHTML = 'Customer <span class="text-blue-400">Orders</span>';
                sub.classList.add('hidden');
                renderOrders();
            } else {
                btn.innerText = "View Orders";
                inv.classList.remove('hidden');
                ord.classList.add('hidden');
                title.innerHTML = 'Inventory <span class="text-pink-400">Control</span>';
                sub.classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }

        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedImageData = await compressImage(file, 800, 0.6);
            }
        }

        function filterAdmin(category) {
            currentFilter = category;
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            renderAdminProducts();
        }

        function renderAdminProducts() {
            const grid = document.getElementById('admin-product-grid');
            let filteredProducts = currentFilter === "All Styles" ? products : products.filter(p => p.category === currentFilter);

            grid.innerHTML = filteredProducts.map((p) => {
                return `
                <div class="product-card p-3 rounded-3xl relative group flex flex-col">
                    <div class="absolute top-2 right-2 z-20 flex gap-2 md:opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editProduct('${p.id}')" class="bg-yellow-400 p-2 rounded-lg border-2 border-black shadow-[2px_2px_0px_#000] text-sm">✏️</button>
                        <button onclick="deleteProduct('${p.id}')" class="bg-red-400 p-2 rounded-lg border-2 border-black shadow-[2px_2px_0px_#000] text-sm">🗑️</button>
                    </div>
                    <div class="aspect-square bg-gray-100 rounded-2xl mb-4 overflow-hidden relative">
                        <img src="${p.img}" alt="${p.name}" loading="lazy" class="w-full h-full object-cover group-hover:scale-105 transition duration-700">
                        <span class="absolute top-3 left-3 text-[9px] font-bold uppercase tracking-widest bg-white/80 backdrop-blur-sm px-3 py-1 rounded-full border border-black/10">${p.category}</span>
                    </div>
                    <h3 class="font-bold text-base sm:text-lg leading-tight truncate">${p.name}</h3>
                    <p class="text-gray-400 text-xs mb-4 italic truncate">${p.desc}</p>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-lg sm:text-xl font-black tracking-tight">$${p.price.toFixed(2)}</span>
                        <span class="text-[10px] font-bold uppercase text-gray-500">${p.category}</span>
                    </div>
                </div>
            `;
            }).join('');
        }

        function renderOrders() {
            const grid = document.getElementById('orders-grid');
            if (orders.length === 0) {
                grid.innerHTML = '<p class="text-center text-gray-400 font-bold py-20 uppercase tracking-widest">No orders yet... 🌸</p>';
                return;
            }

            grid.innerHTML = orders.map((o) => `
                <div class="order-card p-6 flex flex-col md:flex-row gap-6 animate-pop">
                    <div class="w-full md:w-48 aspect-[3/4] border-2 border-black rounded-xl overflow-hidden bg-gray-100">
                        <img src="${o.receipt}" class="w-full h-full object-cover cursor-zoom-in" onclick="window.open(this.src)">
                    </div>
                    <div class="flex-grow">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-2xl font-black italic uppercase text-pink-500">${o.name}</h3>
                                <p class="text-xs font-bold text-gray-400">${o.date}</p>
                            </div>
                            <span class="px-4 py-1 bg-black text-white text-[10px] font-bold rounded-full uppercase">${o.city === 'Other' ? 'Overseas' : 'Local Cambodia'}</span>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 text-sm">
                            <p><strong>📞 Phone:</strong> ${o.phone}</p>
                            <p><strong>📍 City:</strong> ${o.city}</p>
                            <p class="sm:col-span-2"><strong>🗺️ Location:</strong> <a href="${o.location.includes('http') ? o.location : '#'}" target="_blank" class="text-blue-500 underline break-all">${o.location}</a></p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-200">
                            <p class="text-[10px] font-black uppercase mb-2">Order Items:</p>
                            <ul class="text-xs space-y-1 mb-3">
                                ${o.items.map(i => `<li>• ${i.name} ($${i.price.toFixed(2)})</li>`).join('')}
                            </ul>
                            <p class="text-lg font-black text-right uppercase">Total Paid: ${o.total}</p>
                        </div>
                    </div>
                    <div class="flex md:flex-col justify-end gap-2">
                        <button onclick="deleteOrder('${o.id}')" class="p-4 bg-red-100 text-red-600 border-2 border-red-600 rounded-xl font-bold hover:bg-red-600 hover:text-white transition">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteOrder(id) {
            if (confirm("Clear this order from history?")) {
                db.collection('orders').doc(id).delete()
                    .catch((err) => { console.error(err); alert('Delete failed, try again.'); });
            }
        }

        function openAdminModal() {
            resetForm();
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function closeAdminModal() { document.getElementById('form-modal').classList.add('hidden'); }

        async function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const desc = document.getElementById('p-desc').value;
            const category = document.getElementById('p-category').value;
            const editId = document.getElementById('edit-index').value;

            if (!name || !price) { alert("Please fill Name and Price!"); return; }

            try {
                if (editId) {
                    // Update existing product. Only change the image if a new one was picked.
                    const data = { name, price, desc, category };
                    if (selectedImageData) data.img = selectedImageData;
                    await db.collection('products').doc(editId).update(data);
                } else {
                    await db.collection('products').add({
                        name, price, desc, category,
                        img: selectedImageData || 'https://placehold.co/400x400?text=Nail',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                closeAdminModal();
                alert("Success! The Shop is updated! 🎀");
            } catch (err) {
                console.error('Save failed:', err);
                alert("Save failed. Please check your internet and try again.");
            }
        }

        function editProduct(id) {
            const p = products.find((x) => x.id === id);
            if (!p) return;
            document.getElementById('form-title').innerText = "Edit Product";
            document.getElementById('edit-index').value = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-desc').value = p.desc;
            document.getElementById('p-category').value = p.category;
            document.getElementById('p-file').value = "";
            selectedImageData = "";
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "Add New Product";
            document.getElementById('edit-index').value = "";
            document.getElementById('p-name').value = "";
            document.getElementById('p-price').value = "";
            document.getElementById('p-desc').value = "";
            document.getElementById('p-file').value = "";
            selectedImageData = "";
        }

        function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                db.collection('products').doc(id).delete()
                    .catch((err) => { console.error(err); alert('Delete failed, try again.'); });
            }
        }
    </script>
</body>
</html>
